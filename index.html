<!DOCTYPE html>
<html>
<body>
    <h2>Gerador PACIF Simplificado</h2>
    <input type="text" id="p" placeholder="Público"><br><br>
    <input type="text" id="a" placeholder="Ação"><br><br>
    <textarea id="c" placeholder="Contexto"></textarea><br><br>
    <textarea id="i" placeholder="Instruções"></textarea><br><br>
    <input type="text" id="f" placeholder="Formato"><br><br>
    
    <button onclick="gerar()">GERAR PROMPT</button>
    
    <div style="background:#eee; padding:10px; margin-top:20px;">
        <p id="promptFinal">O resultado aparecerá aqui.</p>
    </div>

    <script>
        function gerar() {
            var p = document.getElementById('p').value;
            var a = document.getElementById('a').value;
            var c = document.getElementById('c').value;
            var i = document.getElementById('i').value;
            var f = document.getElementById('f').value;
            
            var resultado = "Atue como " + p + ". Ação: " + a + ". Contexto: " + c + ". Regras: " + i + ". Formato: " + f;
            document.getElementById('promptFinal').innerText = resultado;
        }
    </script>
</body>
</html>
