<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador PACIF</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f9; color: #333; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 800px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #1a73e8; font-size: 24px; text-align: center; margin-bottom: 30px; }
        .input-box { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        .result-container { margin-top: 30px; padding: 20px; background-color: #f8f9fa; border-left: 5px solid #1a73e8; border-radius: 4px; }
        #promptFinal { white-space: pre-wrap; font-size: 15px; line-height: 1.6; color: #222; }
        .copy-btn { background-color: #34a853; margin-top: 15px; }
        .copy-btn:hover { background-color: #2d8e47; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Gerador de Prompts PACIF</h1>

    <div class="input-box">
        <label>P - Público (Quem a IA deve ser?)</label>
        <input type="text" id="p" placeholder="Ex: Professor de Engenharia Civil">
    </div>

    <div class="input-box">
        <label>A - Ação (O que deve ser feito?)</label>
        <input type="text" id="a" placeholder="Ex: Elaborar 10 questões de Hidrostática">
    </div>

    <div class="input-box">
        <label>C - Contexto (Cenário e detalhes)</label>
        <textarea id="c" placeholder="Ex: Alunos de graduação, foco em pressão manométrica..."></textarea>
    </div>

    <div class="input-box">
        <label>I - Instruções (Regras e restrições)</label>
        <textarea id="i" placeholder="Ex: Siga as normas da ABNT, use linguagem técnica..."></textarea>
    </div>

    <div class="input-box">
        <label>F - Formato (Como deve ser a saída?)</label>
        <input type="text" id="f" placeholder="Ex: PDF, Tabela, Lista em Markdown">
    </div>

    <button onclick="gerar()">GERAR PROMPT</button>

    <div class="result-container">
        <label>Seu Prompt Pronto:</label>
        <p id="promptFinal">Preencha os campos e clique em gerar...</p>
        <button class="copy-btn" onclick="copiar()">COPIAR PROMPT</button>
    </div>
</div>

<script>
    function gerar() {
        const p = document.getElementById('p').value;
        const a = document.getElementById('a').value;
        const c = document.getElementById('c').value;
        const i = document.getElementById('i').value;
        const f = document.getElementById('f').value;
